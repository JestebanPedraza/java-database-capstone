<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Select Role</title>
    <link rel="icon" href="./assets/images/logo/logo.png" type="image/png">
    
    <!-- Link Stylesheets -->
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Add JavaScript Files with defer -->
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <!-- Insert a Header Placeholder -->
            <div id="header"></div>

            <!-- Define the Main Section -->
            <main class="main-content">
                <h2>Selecciona tu rol</h2>
                
                <div class="role-selection">
                    <button id="btn-admin" onclick="selectRole('admin')">Admin</button>
                    <button id="btn-doctor" onclick="selectRole('doctor')">Doctor</button>
                    <button id="btn-patient" onclick="selectRole('patient')">Paciente</button>
                </div>
            </main>

            <!-- Insert a Footer Placeholder -->
            <div id="footer"></div>
        </div>
    </div>

    <!-- Create a Modal Structure -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Load Page-Specific Logic Module -->
    <script type="module" src="./js/services/index.js" defer></script>
</body>
</html>
