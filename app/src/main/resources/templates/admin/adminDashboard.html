<!-- adminDashboard.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/Logo.png}" />
    
    <!-- Enlaces CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <!-- Archivos JavaScript con defer -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <!-- Header dinámico -->
            <div id="header"></div>

            <!-- Contenido principal -->
            <main class="main-content">
                <!-- Barra de búsqueda -->
                <input type="text" id="searchBar" placeholder="buscar por nombre de doctor" />

                <!-- Sección de filtros -->
                <div class="filter-wrapper">
                    <select class="filter-select" id="filterTime">
                        <option value="">Ordenar por tiempo (Todos)</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                    
                    <select class="filter-select" id="filterSpecialty">
                        <option value="">Filtrar por especialidad (Todas)</option>
                        <option value="Cardiology">Cardiología</option>
                        <option value="Dentistry">Odontología</option>
                        <option value="Pediatrics">Pediatría</option>
                        <option value="General">Medicina General</option>
                    </select>
                </div>

                <!-- Lista dinámica de doctores -->
                <div id="content"></div>
            </main>

            <!-- Footer dinámico -->
            <div id="footer"></div>
        </div>
    </div>

    <!-- Modal para agregar doctores -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Archivos JavaScript específicos del panel -->
    <script type="module" th:src="@{/js/services/adminDashboard.js}" defer></script>
    <script type="module" th:src="@{/js/components/doctorCard.js}" defer></script>
</body>
</html>
